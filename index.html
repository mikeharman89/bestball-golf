// ── STATE ────────────────────────────────────────────────────────────────────
let state = {
  view:         'home',      // home | leaderboard | picks | admin | archive
  user:         null,
  isAdmin:      false,
  tournaments:  [],
  activeTournament: null,
  mastersData:  {},
  picksData:    [],          // [{id, name, r1:[g1,g2,g3,g4], r2:[g1,g2,g3,g4]}]

  expandedRow:  null,
  expandedGolfer: null,
};

// ── AUTH ─────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  state.user    = user;
  state.isAdmin = user?.email === ADMIN_EMAIL;
  if (state.view === 'home') renderHome();
  else if (state.view === 'leaderboard') renderLeaderboard();
  else if (state.view === 'admin') renderAdmin();
});

async function adminLogin(email, password) {
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e) {
    alert('Login failed: ' + e.message);
  }
}

async function anonLogin() {
  if (!state.user) await signInAnonymously(auth);
}

// ── ROUTER ───────────────────────────────────────────────────────────────────
function navigate(view, data = {}) {
  state.view        = view;
  state.expandedRow = null;
  if (data.tournament) state.activeTournament = data.tournament;
  if      (view === 'leaderboard' && state.activeTournament) loadLeaderboard();
  else if (view === 'picks'       && state.activeTournament) loadPicks();
  else if (view === 'admin')                                  loadAdmin();
  else if (view === 'archive')                                loadArchive();
  else                                                        loadHome();
}

// ── FIRESTORE HELPERS ────────────────────────────────────────────────────────
async function getTournaments() {
  const snap = await getDocs(query(collection(db, 'tournaments'), orderBy('startDate', 'desc')));
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function getTournament(id) {
  const snap = await getDoc(doc(db, 'tournaments', id));
  return snap.exists() ? { id: snap.id, ...snap.data() } : null;
}

async function getPicks(tournamentId) {
  const snap = await getDocs(collection(db, 'tournaments', tournamentId, 'picks'));
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function savePick(tournamentId, pickId, data) {
  if (pickId) {
    await updateDoc(doc(db, 'tournaments', tournamentId, 'picks', pickId), data);
  } else {
    await addDoc(collection(db, 'tournaments', tournamentId, 'picks'), data);
  }
}

// ── SCORE FETCH ──────────────────────────────────────────────────────────────
async function fetchScores(tournament) {
  if (!tournament?.scoreFeed) return {};
  try {
    const res  = await fetch(tournament.scoreFeed);
    const data = await res.json();
    const out  = {};
    // Support Masters feed format
    for (const p of (data.data?.player || [])) {
      out[p.full_name] = {
        r1: p.round1?.scores || [],
        r2: p.round2?.scores || [],
        r3: p.round3?.scores || [],
        r4: p.round4?.scores || [],
        teetimes: {
          r1: p.round1?.teetime || '',
          r2: p.round2?.teetime || '',
          r3: p.round3?.teetime || '',
          r4: p.round4?.teetime || '',
        },
      };
    }
    return out;
  } catch(e) {
    console.error('Score fetch failed', e);
    return {};
  }
}

// ── SCORE HELPERS ────────────────────────────────────────────────────────────
function normalizeName(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/ø/g,'o').replace(/æ/g,'ae').replace(/ð/g,'d').replace(/þ/g,'th').replace(/ß/g,'ss')
    .replace(/[^a-z0-9 ]/g,'').trim();
}

function findGolfer(name) {
  if (!name) return null;
  const nl = normalizeName(name);
  let match = Object.keys(state.mastersData).find(k => normalizeName(k) === nl);
  if (match) return match;
  const last = nl.split(' ').pop();
  return Object.keys(state.mastersData).find(k => normalizeName(k).includes(last)) || null;
}

function holeScoreVsPar(golferName, roundKey) {
  const key = findGolfer(golferName);
  if (!key) return Array(18).fill(null);
  const scores = state.mastersData[key]?.[roundKey] || [];
  const result = Array(18).fill(null);
  let started = false;
  for (let i = 0; i < 18; i++) {
    if (scores[i] !== null && scores[i] !== undefined) {
      result[i] = scores[i] - PARS[i];
      started = true;
    } else if (started) break;
  }
  return result;
}

function runningToPar(golferName, roundKey) {
  const perHole = holeScoreVsPar(golferName, roundKey);
  const result  = Array(18).fill(null);
  let cum = 0, started = false;
  for (let i = 0; i < 18; i++) {
    if (perHole[i] !== null) { cum += perHole[i]; result[i] = cum; started = true; }
    else if (started) break;
  }
  return result;
}

function bestBall(golfers, roundKey) {
  const allPerHole = golfers.map(g => holeScoreVsPar(g, roundKey));
  const bestPerHole = Array.from({length:18}, (_,h) => {
    const vals = allPerHole.map(r => r[h]).filter(v => v !== null);
    return vals.length ? Math.min(...vals) : null;
  });
  const result = Array(18).fill(null);
  let cum = 0, started = false;
  for (let i = 0; i < 18; i++) {
    if (bestPerHole[i] !== null) { cum += bestPerHole[i]; result[i] = cum; started = true; }
    else if (started) break;
  }
  return result;
}

function bestBallPerHole(golfers, roundKey, holeIdx) {
  const vals = golfers.map(g => holeScoreVsPar(g, roundKey)[holeIdx]).filter(v => v !== null);
  return vals.length ? Math.min(...vals) : null;
}

function finalScore(bb)  { const p = bb.filter(v=>v!==null); return p.length ? p[p.length-1] : null; }
function holesThru(bb)   { return bb.filter(v=>v!==null).length; }
function fmtScore(v)     { return v===null?'—':v===0?'E':v>0?'+'+v:''+v; }
function fmtHole(v)      { return v===null?'·':v===0?'E':v>0?'+'+v:''+v; }
function totalCls(v)     { return v===null?'':v<0?'under':v>0?'over':''; }
function holeCls(val, prev) {
  if (val===null) return 'empty';
  const d = prev===null ? val : val-prev;
  if (d<=-2) return 'eagle'; if (d===-1) return 'birdie';
  if (d===0) return ''; if (d===1) return 'bogey'; return 'double';
}

function detectCurrentRound() {
  for (let r = 4; r >= 1; r--) {
    const key = 'r' + r;
    if (Object.values(state.mastersData).some(p => (p[key]||[]).some(s => s!==null && s!==undefined))) return r;
  }
  return null;
}

function getTeetime(golferName, roundKey) {
  const key = findGolfer(golferName);
  if (!key) return '';
  return state.mastersData[key]?.teetimes?.[roundKey] || '';
}

            <div class="tc-dates">${t.dates || ''}</div>
            <div class="tc-actions">
              <button class="btn-gold" onclick="event.stopPropagation(); submitPicksForPhase(${JSON.stringify(t).replace(/"/g,'&quot;')}, 'weekday')">Thu &amp; Fri Picks</button>
              <button class="btn-gold" onclick="event.stopPropagation(); submitPicksForPhase(${JSON.stringify(t).replace(/"/g,'&quot;')}, 'weekend')">Sat &amp; Sun Picks</button>
              <button class="btn-outline" onclick="event.stopPropagation(); navigate('leaderboard', {tournament: ${JSON.stringify(t).replace(/"/g,'&quot;')}})">Leaderboard →</button>

          </div>`).join('')}
      ` : `<div class="no-tournament">No active tournament.<br><small>Check back when the next event opens.</small></div>`}

      ${archived.length ? `
        <div class="section-label" style="margin-top:32px">Past Tournaments</div>
        <div class="archive-list">
          ${archived.map(t => `
            <div class="archive-card" onclick="navigate('leaderboard', {tournament: ${JSON.stringify(t).replace(/"/g,'&quot;')}})">
              <div>
                <div class="ac-name">${t.name}</div>
                <div class="ac-dates">${t.dates || ''}</div>
              </div>

        </div>` : ''}

      ${state.isAdmin ? `

        </div>` : `
        <div style="text-align:center; margin-top:40px">

    </div>`;

// LEADERBOARD
async function loadLeaderboard() {
  showLoading('appRoot');
  const t = state.activeTournament;
  state.mastersData = await fetchScores(t);
  state.picksData   = await getPicks(t.id);

  const r = detectCurrentRound();
  state.currentTab = r ? 'r'+r : 'overall';

  renderLeaderboard();

  // Auto-refresh if active
  if (t.status === 'active') {
    if (window._refreshTimer) clearInterval(window._refreshTimer);
    window._refreshTimer = setInterval(async () => {
      state.mastersData = await fetchScores(t);
      if (state.view === 'leaderboard') renderLeaderboard();
    }, 5 * 60 * 1000);
  }
}

function renderLeaderboard() {
  const t = state.activeTournament;
  const tabs = ['overall','r1','r2','r3','r4'];
  const tabLabels = { overall:'Overall', r1:'Round 1', r2:'Round 2', r3:'Round 3', r4:'Round 4' };

  const tabsHtml = tabs.map(tab => `
    <button class="round-tab ${state.currentTab===tab?'active':''} ${tab==='overall'?'overall':''}"
      onclick="setTab('${tab}')">${tabLabels[tab]}</button>`).join('');

  const boardHtml = state.currentTab === 'overall'
    ? buildOverallBoard()
    : buildRoundBoard(state.currentTab);

  document.getElementById('appRoot').innerHTML = `
    <div class="view-leaderboard">
      <div class="view-header">
        <button class="back-btn" onclick="navigate('home')">← Back</button>
        <div class="view-title">${t.name}</div>
        <div class="view-sub">${t.dates || ''}</div>
      </div>
      <div class="status-bar">
        <div class="status-live"><div class="pulse"></div><span>${t.status==='active'?'Live':'Final'}</span></div>
        <div class="last-updated">Updated ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
      <div class="round-tabs">${tabsHtml}</div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Search team…" oninput="renderLeaderboard()">
      </div>
      <div class="table-scroll">${boardHtml}</div>
    </div>`;
}

function buildRoundBoard(roundKey) {
  const t      = state.activeTournament;
  const isWeekend = ['r3','r4'].includes(roundKey);
  const search = (document.getElementById('searchInput')?.value||'').toLowerCase();
  const roundLabels = {r1:'Round 1 — Thursday',r2:'Round 2 — Friday',r3:'Round 3 — Saturday',r4:'Round 4 — Sunday'};

  let rows = state.picksData.map(pick => {
    const golfers = isWeekend ? (pick.r2golfers||pick.r1golfers||[]) : (pick.r1golfers||[]);
    const bb      = bestBall(golfers, roundKey);
    const total   = finalScore(bb);
    const thru    = holesThru(bb);
    const totalH  = golfers.reduce((s,g) => s + holeScoreVsPar(g,roundKey).filter(v=>v!==null).length, 0);
    const pct     = totalH > 0 ? Math.round((totalH/72)*100) : 0;
    return { pick, golfers, bb, total, thru, pct };
  });

  rows.sort((a,b) => {
    if (a.total===null && b.total===null) return 0;
    if (a.total===null) return 1; if (b.total===null) return -1;
    if (a.total !== b.total) return a.total - b.total;
    for (let h=17;h>=0;h--) {
      const av = bestBallPerHole(a.golfers, roundKey, h);
      const bv = bestBallPerHole(b.golfers, roundKey, h);
      if (av===null && bv===null) continue;
      if (av===null) return 1; if (bv===null) return -1;
      if (av!==bv) return av-bv;
    }
    return 0;
  });

  let rank=1;
  rows.forEach((r,i) => {
    if (i>0 && r.total!==rows[i-1].total) rank=i+1;
    r.rankNum = rank;
    r.rankLabel = r.total===null?'—':rank===1?'1st':rank===2?'2nd':rank===3?'3rd':'T'+rank;
  });

  if (search) rows = rows.filter(r => r.pick.name.toLowerCase().includes(search));
  const holeNums = Array.from({length:18},(_,i)=>i+1);

  let html = `<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(201,168,76,0.6);margin-bottom:12px;">${roundLabels[roundKey]}</div>
  <div class="leaderboard">
    <div class="lb-header">
      <div class="lb-cell">POS</div><div class="lb-cell" style="justify-content:center">%</div>
      <div class="lb-cell" style="padding-left:6px">TEAM</div>
      <div class="lb-cell" style="justify-content:center">TOT</div>
      <div class="lb-cell" style="justify-content:center">THRU</div>
      ${holeNums.map(h=>`<div class="lb-cell" style="justify-content:center;font-size:9px">${h}</div>`).join('')}
    </div>`;

  rows.forEach((r,idx) => {
    const isTop3     = r.rankNum<=3 && r.total!==null;
    const isExpanded = state.expandedRow===idx;
    const holeCells  = r.bb.map((v,i)=>`<div class="lb-cell hole-score ${holeCls(v,r.bb[i-1]??null)}">${fmtHole(v)}</div>`).join('');

    html += `
    <div class="lb-row ${isTop3?'top-3':''} ${isExpanded?'expanded':''}" onclick="toggleExpand(${idx})">
      <div class="lb-cell rank ${r.rankNum<=3&&r.total!==null?'gold':''}">${r.rankLabel}</div>
      <div class="lb-cell pct">${r.pct>0?r.pct+'%':'—'}</div>
      <div class="lb-cell name">${r.pick.name}</div>
      <div class="lb-cell total ${totalCls(r.total)}">${fmtScore(r.total)}</div>
      <div class="lb-cell thru">${r.thru>0?r.thru:'—'}</div>
      ${holeCells}
    </div>
    <div class="lb-detail">
      <div class="golfer-cards">
        ${r.golfers.map((g,gi) => {
          const gRun    = runningToPar(g, roundKey);
          const gPerH   = holeScoreVsPar(g, roundKey);
          const played  = gRun.filter(v=>v!==null);
          const gScore  = played.length ? played[played.length-1] : null;
          const gThru   = played.length;
          const teetime = getTeetime(g, roundKey);
          const thruLbl = gThru===18?'F':gThru>0?'Thru '+gThru:teetime?teetime+' EDT':'NS';
          const isBest  = r.bb.some((v,i)=>v!==null && runningToPar(g,roundKey)[i]===v);
          const cardId  = `gc-${idx}-${gi}`;
          const playedH = Array.from({length:18},(_,h)=>({h,p:gPerH[h],r:gRun[h]})).filter(x=>x.r!==null||x.p!==null);
          const holeCols = playedH.map(({h,p,r:rv})=>{
            const cls = p===null?'':p<=-2?'eagle':p===-1?'birdie':p===0?'':p===1?'bogey':'double';
            return `<span class="gh-hole">${h+1}</span>
              <span class="gh-per ${cls}">${p===null?'·':p===0?'E':p>0?'+'+p:''+p}</span>
              <span class="gh-run ${totalCls(rv)}">${rv===null?'·':rv===0?'E':rv>0?'+'+rv:''+rv}</span>`;
          }).join('');
          return `
          <div class="golfer-card ${isBest?'best':''}" onclick="event.stopPropagation(); toggleGolfer('${cardId}')">
            <div class="gc-tier">Tier ${gi+1}</div>
            <div class="gc-name">${g||'—'} <span class="gc-expand-icon" id="icon-${cardId}">▸</span></div>
            <div class="gc-score ${totalCls(gScore)}">${fmtScore(gScore)} <span class="gc-thru">${thruLbl}</span></div>
            ${isBest?'<div class="gc-badge">★ Best ball</div>':''}
            <div class="gc-holes" id="${cardId}" style="display:none">
              <div class="gh-table">
                <span class="gh-label">Hole</span><span class="gh-label">Score</span><span class="gh-label">Total</span>
                ${holeCols||'<span style="font-size:10px;opacity:.5;grid-column:span 3">No data yet</span>'}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });

  html += '</div>';
  return rows.length ? html : '<div class="state-msg">No teams found.</div>';
}

function buildOverallBoard() {
  const search = (document.getElementById('searchInput')?.value||'').toLowerCase();

  // Build map of weekend picks
  const ssMap = {};
  state.picksData.forEach(p => { if (p.r2golfers) ssMap[p.name] = p.r2golfers; });

  let rows = state.picksData.map(pick => {
    const tfG = pick.r1golfers || [];
    const ssG = pick.r2golfers || tfG;
    const r1bb=bestBall(tfG,'r1'), r2bb=bestBall(tfG,'r2');
    const r3bb=bestBall(ssG,'r3'), r4bb=bestBall(ssG,'r4');
    const r1=finalScore(r1bb), r2=finalScore(r2bb), r3=finalScore(r3bb), r4=finalScore(r4bb);
    const total = [r1,r2,r3,r4].some(v=>v!==null) ? [r1,r2,r3,r4].reduce((s,v)=>s+(v??0),0) : null;
    const holesPlayed = ['r1','r2'].reduce((s,rk)=>s+tfG.reduce((ss,g)=>ss+holeScoreVsPar(g,rk).filter(v=>v!==null).length,0),0)
                      + ['r3','r4'].reduce((s,rk)=>s+ssG.reduce((ss,g)=>ss+holeScoreVsPar(g,rk).filter(v=>v!==null).length,0),0);
    const pct = holesPlayed>0 ? Math.round((holesPlayed/288)*100) : 0;
    return { pick, r1, r2, r3, r4, total, pct };
  });

  rows.sort((a,b) => {
    if (a.total===null&&b.total===null) return 0;
    if (a.total===null) return 1; if (b.total===null) return -1;
    return a.total-b.total;
  });

  let rank=1;
  rows.forEach((r,i) => {
    if (i>0&&r.total!==rows[i-1].total) rank=i+1;
    r.rankNum=rank;
    r.rankLabel=r.total===null?'—':rank===1?'1st':rank===2?'2nd':rank===3?'3rd':'T'+rank;
  });

  if (search) rows = rows.filter(r => r.pick.name.toLowerCase().includes(search));

  let html = `<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(201,168,76,0.6);margin-bottom:12px;">Overall Standings</div>
  <div class="leaderboard">
    <div class="lb-header overall-header">
      <div class="lb-cell">POS</div><div class="lb-cell" style="justify-content:center">%</div>
      <div class="lb-cell" style="padding-left:6px">TEAM</div>
      <div class="lb-cell" style="justify-content:center">R1</div>
      <div class="lb-cell" style="justify-content:center">R2</div>
      <div class="lb-cell" style="justify-content:center">R3</div>
      <div class="lb-cell" style="justify-content:center">R4</div>
      <div class="lb-cell" style="justify-content:center">TOTAL</div>
    </div>`;

  rows.forEach(r => {
    const isTop3 = r.rankNum<=3&&r.total!==null;
    html += `
    <div class="lb-row overall-row ${isTop3?'top-3':''}">
      <div class="lb-cell rank ${r.rankNum<=3&&r.total!==null?'gold':''}">${r.rankLabel}</div>
      <div class="lb-cell pct">${r.pct>0?r.pct+'%':'—'}</div>
      <div class="lb-cell name">${r.pick.name}</div>
      <div class="lb-cell round-col ${totalCls(r.r1)}">${fmtScore(r.r1)}</div>
      <div class="lb-cell round-col ${totalCls(r.r2)}">${fmtScore(r.r2)}</div>
      <div class="lb-cell round-col ${totalCls(r.r3)}">${fmtScore(r.r3)}</div>
      <div class="lb-cell round-col ${totalCls(r.r4)}">${fmtScore(r.r4)}</div>
      <div class="lb-cell overall-total ${totalCls(r.total)}">${fmtScore(r.total)}</div>
    </div>`;
  });

  html += '</div>';
  return rows.length ? html : '<div class="state-msg">No picks submitted yet.</div>';
}

// PICKS
function submitPicksForPhase(tournament, phase) {
  // Override the tournament's picksPhase with the explicitly chosen phase
  const t = { ...tournament, picksPhase: phase };
  navigate('picks', { tournament: t });
}

async function loadPicks() {
  await anonLogin();
  showLoading('appRoot');
  const t = state.activeTournament;

  // Find existing pick by this user (stored by userId)
  let existingPick = null;
  if (state.user) {
    const picks = await getPicks(t.id);
    existingPick = picks.find(p => p.userId === state.user.uid) || null;
  }

  state.mastersData = await fetchScores(t);
  renderPicks(t, existingPick);
}

function renderPicks(t, existingPick) {
  const isWeekend = t.picksPhase === 'weekend';
  const tiers     = t.tiers || [];
  const phase     = isWeekend ? 'r2golfers' : 'r1golfers';
  const existing  = existingPick?.[phase] || [];
  const locked    = t.locked || false;

  if (locked) {
    document.getElementById('appRoot').innerHTML = `
      <div class="view-picks">
        <div class="view-header">
          <button class="back-btn" onclick="navigate('home')">← Back</button>
          <div class="view-title">Submit Picks</div>
        </div>
        <div class="state-msg">🔒 Picks are locked for this round.</div>
      </div>`;
    return;
  }

  document.getElementById('appRoot').innerHTML = `
    <div class="view-picks">
      <div class="view-header">
        <button class="back-btn" onclick="navigate('home')">← Back</button>
        <div class="view-title">Submit Picks</div>
        <div class="view-sub">${t.name} — ${isWeekend?'Sat & Sun':'Thu & Fri'}</div>
      </div>

      <div class="picks-form">
        <div class="picks-intro">Select one golfer from each tier. Picks can be changed until the round starts.</div>

        <div class="field-group">
          <label class="field-label">Your Name</label>
          <input type="text" id="picksName" class="field-input" placeholder="Full name" value="${existingPick?.name||''}">
        </div>

        ${tiers.map((tier, ti) => `
          <div class="field-group">
            <label class="field-label">Tier ${ti+1}</label>
            <div class="tier-grid">
              ${(tier.golfers||[]).map(g => {
                const sel = existing[ti] === g;
                const score = getGolferCurrentScore(g);
                return `<div class="golfer-option ${sel?'selected':''}" onclick="selectGolfer(${ti}, '${g.replace(/'/g,"\\'")}', this)">
                  <div class="go-name">${g}</div>
                  <div class="go-score ${totalCls(score)}">${fmtScore(score)}</div>
                </div>`;
              }).join('')}
            </div>
          </div>`).join('')}

        <button class="btn-gold btn-full" onclick="submitPicks('${t.id}', '${phase}', ${JSON.stringify(tiers.map((_,i)=>i)).replace(/"/g,'')})">
          ${existingPick ? 'Update Picks' : 'Submit Picks'}
        </button>
      </div>
    </div>`;

  // Store selections in memory
  window._pickSelections = existing.slice();
}

function selectGolfer(tierIdx, golferName, el) {
  // Deselect others in same tier
  const tierGrids = document.querySelectorAll('.tier-grid');
  tierGrids[tierIdx]?.querySelectorAll('.golfer-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  if (!window._pickSelections) window._pickSelections = [];
  window._pickSelections[tierIdx] = golferName;
}

function getGolferCurrentScore(golferName) {
  const t = state.activeTournament;
  if (!t) return null;
  const r = detectCurrentRound();
  if (!r) return null;
  const rk  = 'r'+r;
  const run = runningToPar(golferName, rk);
  const played = run.filter(v=>v!==null);
  return played.length ? played[played.length-1] : null;
}

async function submitPicks(tournamentId, phase, tierIndices) {
  const name = document.getElementById('picksName')?.value?.trim();
  if (!name) { alert('Please enter your name.'); return; }

  const selections = window._pickSelections || [];
  const t = state.activeTournament;
  const tiers = t.tiers || [];

  if (selections.filter(Boolean).length < tiers.length) {
    alert('Please select one golfer from each tier.');
    return;
  }

  const picks = await getPicks(tournamentId);
  const existing = picks.find(p => p.userId === state.user?.uid);

  const data = {
    name,
    userId: state.user?.uid || 'anon',
    updatedAt: serverTimestamp(),
    [phase]: selections,
  };

  if (!existing) data.r1golfers = selections; // default

  try {
    await savePick(tournamentId, existing?.id || null, data);
    alert('Picks saved! ✓');
    navigate('leaderboard', { tournament: t });
  } catch(e) {
    alert('Error saving picks: ' + e.message);
  }
}

function showNewTournamentForm() {
  const f = document.getElementById('newTournamentForm');
  f.style.display = f.style.display==='none' ? 'block' : 'none';
}

async function createTournament() {
  const name  = document.getElementById('tName').value.trim();
  const dates = document.getElementById('tDates').value.trim();
  const feed  = document.getElementById('tFeed').value.trim();
  const start = document.getElementById('tStart').value;
  const status= document.getElementById('tStatus').value;
  if (!name) { alert('Name required'); return; }
  await addDoc(collection(db, 'tournaments'), {
    name, dates, scoreFeed: feed, startDate: start, status,
    locked: false, picksPhase: 'weekday', tiers: [], createdAt: serverTimestamp()
  });
  await loadAdmin();
}

async function toggleLock(id, current) {
  await updateDoc(doc(db, 'tournaments', id), { locked: !current });
  await loadAdmin();
}

async function archiveTournament(id) {
  if (!confirm('Archive this tournament?')) return;
  await updateDoc(doc(db, 'tournaments', id), { status: 'archived' });
  await loadAdmin();
}

  const t = await getTournament(tournamentId);
  const tiers = t.tiers || [{golfers:[]},{golfers:[]},{golfers:[]},{golfers:[]}];

  el.style.display = 'block';
  el.innerHTML = `
    <div class="tiers-editor">
      <div class="section-label" style="margin-top:16px">Manage Tiers</div>
      <div class="tiers-phase">
        <label class="field-label">Picks Phase</label>

async function savePhase(tournamentId) {
  const phase = document.getElementById('phase-'+tournamentId).value;
  await updateDoc(doc(db, 'tournaments', tournamentId), { picksPhase: phase==='weekend'?'weekend':'weekday' });
  alert('Phase saved!');
}

async function saveTiers(tournamentId) {
  const tiers = [0,1,2,3].map(i => {
    const val = document.getElementById(`tier-${tournamentId}-${i}`)?.value || '';
    return { golfers: val.split('\n').map(g=>g.trim()).filter(Boolean) };
  });
  await updateDoc(doc(db, 'tournaments', tournamentId), { tiers });
  alert('Tiers saved!');

function toggleNewPickForm(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function addNewPick(tournamentId) {
  const name = document.getElementById('new-name-' + tournamentId)?.value?.trim();
  if (!name) { alert('Please enter a name.'); return; }

  const r1golfers = [0,1,2,3].map(i =>
    document.getElementById('new-r1-' + tournamentId + '-' + i)?.value?.trim() || ''
  ).filter(Boolean);

  if (r1golfers.length < 4) { alert('Please select all 4 Thu/Fri golfers.'); return; }

  const r2inputs = [0,1,2,3].map(i =>
    document.getElementById('new-r2-' + tournamentId + '-' + i)?.value?.trim() || ''
  );
  const r2golfers = r2inputs.filter(Boolean);

  const data = {
    name,
    r1golfers,
    userId: 'admin',
    paid: false,
    updatedAt: serverTimestamp(),
  };
  if (r2golfers.length === 4) data.r2golfers = r2golfers;

  try {
    await addDoc(collection(db, 'tournaments', tournamentId, 'picks'), data);
    alert('Entry added! ✓');
    // Refresh the picks panel
    document.getElementById('picks-' + tournamentId).style.display = 'none';
    await managePicks(tournamentId);
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

function toggleUnpaidList(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function togglePaid(tournamentId, pickId, paid) {
  try {
    await updateDoc(doc(db, 'tournaments', tournamentId, 'picks', pickId), { paid });
  } catch(e) {
    alert('Error saving payment status: ' + e.message);
  }
}

async function savePickEdit(tournamentId, pickId) {
  const name = document.getElementById('pname-' + pickId)?.value?.trim();
  if (!name) { alert('Name cannot be empty'); return; }

  // Collect r1 golfers
  const r1golfers = [0,1,2,3].map(i => document.getElementById(`p-${pickId}-r1-${i}`)?.value?.trim() || '').filter(Boolean);
  // Collect r2 golfers if they exist
  const r2inputs  = [0,1,2,3].map(i => document.getElementById(`p-${pickId}-r2-${i}`)?.value?.trim() || '');
  const r2golfers = r2inputs.filter(Boolean);

  const data = { name, r1golfers };
  if (r2golfers.length) data.r2golfers = r2golfers;

  try {
    await updateDoc(doc(db, 'tournaments', tournamentId, 'picks', pickId), data);
    alert('Pick saved ✓');
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

async function deletePick(tournamentId, pickId) {
  if (!confirm('Delete this pick? This cannot be undone.')) return;
  try {
    await deleteDoc(doc(db, 'tournaments', tournamentId, 'picks', pickId));
    document.getElementById('pick-row-' + pickId)?.remove();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

async function editTournament(id) {
  const t = await getTournament(id);
  const name   = prompt('Tournament name:', t.name);
  if (name===null) return;
  const dates  = prompt('Dates:', t.dates||'');
  const feed   = prompt('Score feed URL:', t.scoreFeed||'');
  await updateDoc(doc(db, 'tournaments', id), { name, dates, scoreFeed: feed });
  await loadAdmin();
}

async function doAdminLogin() {
  const email = document.getElementById('adminEmail').value;
  const pass  = document.getElementById('adminPass').value;
  if (!email || !pass) { alert('Please enter email and password.'); return; }
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    if (cred.user?.email === ADMIN_EMAIL) {
      state.user    = cred.user;
      state.isAdmin = true;
      navigate('admin');
    } else {
      alert('Not an admin account.');
      await signOut(auth);
    }
  } catch(e) {
    alert('Login failed: ' + e.message);
  }
}

async function doSignOut() {
  await signOut(auth);
  navigate('home');
}

  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");

#appRoot { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:0 16px 60px; }

/* HEADER */
.app-header {
  text-align:center; padding:32px 0 24px;
  border-bottom:1px solid rgba(201,168,76,0.3); margin-bottom:24px;
}
.header-badge {
  display:inline-block; background:var(--gold); color:var(--green-deep);
  font-size:10px; font-weight:500; letter-spacing:3px; padding:4px 14px;
  text-transform:uppercase; margin-bottom:12px;
}
h1 {
  font-family:'Playfair Display',serif; font-size:clamp(28px,7vw,48px);
  font-weight:900; color:var(--cream); line-height:1; letter-spacing:-1px;
}
h1 span { color:var(--gold); font-style:italic; }

/* STATUS */
.status-bar {
  display:flex; justify-content:space-between; align-items:center;
  background:rgba(255,255,255,0.04); border:1px solid rgba(201,168,76,0.2);
  padding:10px 16px; margin-bottom:16px; font-size:11px; letter-spacing:1px;
}
.status-live { display:flex; align-items:center; gap:8px; color:var(--gold); text-transform:uppercase; }
.pulse { width:8px;height:8px;background:var(--gold);border-radius:50%;animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
.last-updated { color:rgba(245,240,232,0.4); font-size:10px; }

/* NAVIGATION */
.back-btn {
  background:none; border:none; color:rgba(245,240,232,0.5);
  font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1px;
  cursor:pointer; padding:0; text-transform:uppercase;
}
.back-btn:hover { color:var(--cream); }

.view-header { margin-bottom:20px; }
.view-title { font-family:'Playfair Display',serif; font-size:24px; font-weight:700; margin-top:6px; }
.view-sub { font-size:11px; color:rgba(245,240,232,0.4); letter-spacing:1px; margin-top:4px; }

/* HOME */
.section-label {
  font-size:10px; letter-spacing:3px; text-transform:uppercase;
  color:rgba(201,168,76,0.7); margin-bottom:12px;
}
.tournament-card {
  background:rgba(255,255,255,0.04); border:1px solid rgba(201,168,76,0.3);
  padding:20px; cursor:pointer; transition:all 0.2s; margin-bottom:12px;
}
.tournament-card:hover { background:rgba(255,255,255,0.07); }
.active-card { border-color:rgba(201,168,76,0.5); }
.tc-badge { font-size:9px; letter-spacing:2px; color:var(--gold); text-transform:uppercase; margin-bottom:8px; }
.tc-name { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; }
.tc-dates { font-size:11px; color:rgba(245,240,232,0.4); margin-top:4px; margin-bottom:16px; }
.tc-actions { display:flex; gap:10px; flex-wrap:wrap; }
.archive-list { display:flex; flex-direction:column; gap:8px; }
.archive-card {
  display:flex; justify-content:space-between; align-items:center;
  background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08);
  padding:14px 16px; cursor:pointer; transition:all 0.2s;
}
.archive-card:hover { background:rgba(255,255,255,0.06); }
.ac-name { font-family:'Playfair Display',serif; font-size:15px; font-weight:700; }
.ac-dates { font-size:11px; color:rgba(245,240,232,0.4); margin-top:2px; }
.ac-arrow { color:rgba(201,168,76,0.6); font-size:18px; }
.no-tournament { text-align:center; padding:40px 20px; color:rgba(245,240,232,0.4); font-size:13px; line-height:1.8; }

/* BUTTONS */
.btn-gold {
  background:var(--gold); color:var(--green-deep); border:none;
  font-family:'DM Mono',monospace; font-size:11px; font-weight:500;
  letter-spacing:2px; text-transform:uppercase; padding:10px 20px;
  cursor:pointer; transition:all 0.2s;
}
.btn-gold:hover { background:var(--gold-light); }
.btn-full { width:100%; padding:14px; font-size:13px; }
.btn-outline {
  background:none; border:1px solid rgba(201,168,76,0.4); color:var(--gold);
  font-family:'DM Mono',monospace; font-size:11px; letter-spacing:2px;
  text-transform:uppercase; padding:10px 20px; cursor:pointer; transition:all 0.2s;
}
.btn-outline:hover { border-color:var(--gold); background:rgba(201,168,76,0.1); }
.btn-text {
  background:none; border:none; color:rgba(245,240,232,0.4);
  font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1px;
  cursor:pointer; text-decoration:underline; text-underline-offset:3px;
}
.btn-text:hover { color:var(--cream); }
.btn-sm {
  background:rgba(255,255,255,0.08); border:none; color:var(--cream);
  font-family:'DM Mono',monospace; font-size:10px; letter-spacing:1px;
  padding:6px 12px; cursor:pointer; transition:all 0.2s;
}
.btn-sm:hover { background:rgba(255,255,255,0.15); }
.btn-sm-red { background:rgba(192,57,43,0.3); }

/* ROUND TABS */
.round-tabs {
  display:flex; gap:2px; margin-bottom:16px;
  border-bottom:1px solid rgba(201,168,76,0.2);
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  scrollbar-width:none; -ms-overflow-style:none;
}
.round-tabs::-webkit-scrollbar { display:none; }
.round-tab {
  background:none; border:none; color:rgba(245,240,232,0.4);
  font-family:'DM Mono',monospace; font-size:11px; letter-spacing:2px;
  text-transform:uppercase; padding:10px 18px; cursor:pointer;
  border-bottom:2px solid transparent; margin-bottom:-1px;
  transition:all 0.2s; white-space:nowrap;
}
.round-tab:hover { color:var(--cream); }
.round-tab.active { color:var(--gold); border-bottom-color:var(--gold); }
.round-tab.overall { color:rgba(201,168,76,0.6); }
.round-tab.overall.active { color:var(--gold-light); border-bottom-color:var(--gold-light); }

/* SEARCH */
.search-wrap { position:relative; margin-bottom:16px; }
.search-wrap input {
  width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(201,168,76,0.2);
  color:var(--cream); font-family:'DM Mono',monospace; font-size:13px;
  padding:12px 16px 12px 40px; outline:none; transition:border-color 0.2s;
}
.search-wrap input::placeholder { color:rgba(245,240,232,0.3); }
.search-wrap input:focus { border-color:var(--gold); }
.search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:rgba(245,240,232,0.3); font-size:14px; }

/* TABLE */
.table-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
.leaderboard  { display:flex; flex-direction:column; gap:2px; min-width:900px; }

.lb-header {
  display:grid;
  grid-template-columns: 52px 56px 180px 58px 52px repeat(18, 1fr);
  padding:8px 12px; font-size:9px; letter-spacing:1.5px; text-transform:uppercase;
  color:rgba(201,168,76,0.7); border-bottom:1px solid rgba(201,168,76,0.2);
}
.lb-header.overall-header {
  grid-template-columns: 52px 56px 180px 80px 80px 80px 80px 100px;
}
.lb-row {
  display:grid;
  grid-template-columns: 52px 56px 180px 58px 52px repeat(18, 1fr);
  padding:0 12px; background:rgba(255,255,255,0.03);
  border:1px solid transparent; cursor:pointer; transition:all 0.15s;
}
.lb-row.overall-row {
  grid-template-columns: 52px 56px 180px 80px 80px 80px 80px 100px;
  cursor:default;
}
.lb-row:hover { background:rgba(255,255,255,0.06); border-color:rgba(201,168,76,0.15); }
.lb-row.expanded { background:rgba(255,255,255,0.06); border-color:rgba(201,168,76,0.3); }
.lb-row.top-3 { background:rgba(201,168,76,0.07); }
.lb-row.top-3:hover { background:rgba(201,168,76,0.12); }

.lb-cell { display:flex; align-items:center; padding:13px 2px; font-size:11px; white-space:nowrap; overflow:hidden; }
.lb-cell.rank { font-size:11px; color:rgba(245,240,232,0.5); }
.lb-cell.rank.gold { color:var(--gold); }
.lb-cell.name { font-family:'Playfair Display',serif; font-size:13px; font-weight:700; color:var(--cream); padding-left:6px; overflow:hidden; text-overflow:ellipsis; }
.lb-cell.hole-score { font-size:10px; justify-content:center; color:rgba(245,240,232,0.55); }
.lb-cell.hole-score.birdie { color:#5dade2; }
.lb-cell.hole-score.eagle  { color:var(--gold); font-weight:500; }
.lb-cell.hole-score.bogey  { color:#e67e73; }
.lb-cell.hole-score.double { color:var(--red); }
.lb-cell.hole-score.empty  { color:rgba(245,240,232,0.15); }
.lb-cell.total { font-size:13px; font-weight:500; justify-content:center; color:var(--cream); }
.lb-cell.total.under { color:#5dade2; } .lb-cell.total.over { color:#e67e73; }
.lb-cell.thru  { font-size:10px; color:rgba(245,240,232,0.4); justify-content:center; }
.lb-cell.pct   { font-size:10px; color:rgba(201,168,76,0.7); justify-content:center; }
.lb-cell.round-col { font-size:12px; font-weight:500; justify-content:center; }
.lb-cell.round-col.under { color:#5dade2; } .lb-cell.round-col.over { color:#e67e73; }
.lb-cell.overall-total { font-size:15px; font-weight:700; justify-content:center; font-family:'Playfair Display',serif; }
.lb-cell.overall-total.under { color:#5dade2; } .lb-cell.overall-total.over { color:#e67e73; }

.lb-detail {
  display:none; background:rgba(0,0,0,0.2);
  border-top:1px solid rgba(201,168,76,0.15); padding:14px 12px; min-width:960px;
}
.lb-row.expanded + .lb-detail { display:block; }

/* GOLFER CARDS */
.golfer-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
@media(max-width:600px) { .golfer-cards { grid-template-columns:repeat(2,1fr); } }
.golfer-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); padding:12px; cursor:pointer; }
.golfer-card.best { border-color:rgba(201,168,76,0.4); background:rgba(201,168,76,0.07); }
.gc-tier  { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:rgba(245,240,232,0.4); margin-bottom:4px; }
.gc-name  { font-family:'Playfair Display',serif; font-size:13px; font-weight:700; color:var(--cream); margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.gc-score { font-size:18px; font-weight:500; }
.gc-score.under { color:#5dade2; } .gc-score.over { color:#e67e73; }
.gc-badge { font-size:9px; letter-spacing:1px; color:var(--gold); text-transform:uppercase; margin-top:4px; }
.gc-thru  { font-size:11px; color:rgba(245,240,232,0.4); margin-left:6px; font-weight:300; }
.gc-expand-icon { font-size:9px; color:rgba(245,240,232,0.35); margin-left:4px; transition:transform 0.2s; display:inline-block; }
.gc-expand-icon.open { transform:rotate(90deg); }
.gc-holes { margin-top:10px; border-top:1px solid rgba(255,255,255,0.08); padding-top:10px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.gh-table { display:grid; grid-template-rows:repeat(3,auto); grid-auto-flow:column; gap:0; min-width:max-content; }
.gh-label { font-size:8px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(201,168,76,0.6); padding:0 8px 4px 0; white-space:nowrap; }
.gh-hole  { color:rgba(245,240,232,0.4); font-size:10px; padding:3px 8px 3px 0; text-align:center; }
.gh-per   { font-size:11px; padding:3px 8px 3px 0; text-align:center; }
.gh-run   { font-size:10px; padding:3px 8px 3px 0; text-align:center; color:rgba(245,240,232,0.5); }
.eagle { color:var(--gold); } .birdie { color:#5dade2; } .bogey { color:#e67e73; } .double { color:var(--red); }
.under { color:#5dade2; } .over { color:#e67e73; }

/* PICKS FORM */
.view-picks { max-width:600px; }
.picks-form { margin-top:16px; }
.picks-intro { font-size:12px; color:rgba(245,240,232,0.5); margin-bottom:20px; line-height:1.6; }
.field-group { margin-bottom:20px; }
.field-label { display:block; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:rgba(201,168,76,0.7); margin-bottom:8px; }
.field-input {
  width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(201,168,76,0.2);
  color:var(--cream); font-family:'DM Mono',monospace; font-size:13px; padding:12px;
  outline:none; transition:border-color 0.2s;
}
.field-input:focus { border-color:var(--gold); }
.tier-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:8px; }
.golfer-option {
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
  padding:10px 12px; cursor:pointer; transition:all 0.15s;
}
.golfer-option:hover { background:rgba(255,255,255,0.08); }
.golfer-option.selected { background:rgba(201,168,76,0.15); border-color:rgba(201,168,76,0.5); }
.go-name  { font-size:12px; color:var(--cream); margin-bottom:3px; }
.go-score { font-size:11px; }

/* ADMIN */
.view-admin { max-width:800px; }
.admin-section { margin-bottom:24px; }
.admin-form { margin-top:16px; display:flex; flex-direction:column; gap:8px; }
.admin-tournament-card {
  background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08);
  padding:16px; margin-bottom:8px;
}
.atc-header { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:12px; }
.atc-name   { font-family:'Playfair Display',serif; font-size:16px; font-weight:700; }
.atc-status { font-size:9px; letter-spacing:2px; text-transform:uppercase; margin-top:4px; color:rgba(245,240,232,0.4); }
.atc-status.active { color:var(--gold); }
.atc-actions { display:flex; gap:6px; flex-wrap:wrap; }
.tiers-editor { padding:12px 0; }
.tiers-phase  { display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.tier-editor  { margin-bottom:12px; }
.te-label     { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:rgba(201,168,76,0.7); margin-bottom:6px; }
.tier-textarea { height:120px; resize:vertical; }

/* LOGIN */
.view-login { display:flex; justify-content:center; align-items:center; min-height:60vh; }
.login-card  { background:rgba(255,255,255,0.04); border:1px solid rgba(201,168,76,0.3); padding:32px; width:100%; max-width:360px; text-align:center; }

/* PICKS MANAGER */
.picks-manager { padding:12px 0; overflow-x:auto; }
.picks-table { width:100%; border-collapse:collapse; font-size:11px; min-width:600px; }
.picks-table th {
  text-align:left; font-size:9px; letter-spacing:2px; text-transform:uppercase;
  color:rgba(201,168,76,0.7); padding:8px 10px; border-bottom:1px solid rgba(201,168,76,0.2);
}
.picks-table td { padding:8px 10px; border-bottom:1px solid rgba(255,255,255,0.05); vertical-align:top; }
.picks-table tr:hover td { background:rgba(255,255,255,0.03); }
.pick-edit-input {
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  color:var(--cream); font-family:'DM Mono',monospace; font-size:11px;
  padding:5px 8px; width:100%; outline:none;
}
.pick-edit-input:focus { border-color:var(--gold); }
.pick-golfer-row { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.pick-golfer-input { flex:1; }
.pick-tier { font-size:9px; color:rgba(201,168,76,0.6); letter-spacing:1px; white-space:nowrap; }
.pick-actions { display:flex; flex-direction:column; gap:4px; }
.pick-golfers { min-width:180px; }
.paid-checkbox { width:16px; height:16px; cursor:pointer; accent-color:var(--gold); }
.pick-edit-input select, select.pick-edit-input {
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  color:var(--cream); font-family:'DM Mono',monospace; font-size:11px; padding:5px 8px;
  width:100%; outline:none; cursor:pointer;
}
select.pick-edit-input option { background:#1a3a2a; color:var(--cream); }

/* MISC */
.state-msg { text-align:center; padding:60px 20px; color:rgba(245,240,232,0.5); font-size:13px; letter-spacing:1px; }
.spinner   { width:32px;height:32px;border:2px solid rgba(201,168,76,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>

  <div class="header-badge">⛳ Best Ball Golf</div>
  <h1>Best Ball <span>Golf</span></h1>
</div>

  <div class="state-msg"><div class="spinner"></div>Loading…</div>
</div>
</body>
